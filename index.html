<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الحضور - جامعيون</title>
    
    <style>
        :root {
            --dark-blue: #003463;    
            --light-blue: #0090de;    
            --orange: #fdac13;        
            --bg-light: #f4f7f9;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, var(--bg-light) 0%, #e8edf1 100%); 
            color: #333;
            margin: 0;
            padding: 50px 20px;
            direction: rtl; 
            text-align: right;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 400px;
            width: 100%;
            background-color: #ffffff;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); 
            text-align: center; 
        }

        /* ----- ستايلات الفورم الأصلية (مختصرة لعدم التكرار) ----- */
        .header-section { margin-bottom: 25px; }
        .logo { margin-bottom: 10px; }
        .logo img { max-width: 180px; height: auto; }
        .brand-name { color: var(--dark-blue); font-size: 28px; font-weight: 800; margin-bottom: 5px; }
        .brand-description { color: #666; font-size: 14px; margin-bottom: 15px; }
        hr { border: 0; height: 1px; background-image: linear-gradient(to right, rgba(0, 0, 0, 0), var(--light-blue), rgba(0, 0, 0, 0)); margin: 20px 0; }
        .form-title { color: var(--dark-blue); margin-bottom: 15px; font-size: 24px; font-weight: 700; }
        .instruction-text { color: var(--orange); font-size: 16px; margin-bottom: 25px; font-weight: 600; }
        .form-group { margin-bottom: 25px; }
        input[type="text"] { width: 100%; padding: 14px 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 17px; background-color: #fcfcfc; transition: border-color 0.3s, box-shadow 0.3s; }
        input[type="text"]:focus { border-color: var(--light-blue); outline: none; box-shadow: 0 0 10px rgba(0, 144, 222, 0.3); background-color: #fff; }
        
        .submit-button { 
            display: flex; /* لترتيب العناصر داخله */
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px;
            background-color: var(--light-blue); 
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 19px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 144, 222, 0.4);
            transition: background-color 0.3s, transform 0.2s, box-shadow 0.3s;
        }

        .submit-button:hover { 
            background-color: var(--dark-blue); 
            transform: translateY(-2px); 
            box-shadow: 0 8px 20px rgba(0, 144, 222, 0.6);
        }

        /* ------------------------------------- */
        /* ----- ستايلات أيقونة التحميل (SPINNER) ----- */
        /* ------------------------------------- */
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 0.8s linear infinite;
            margin-left: 10px; /* المسافة بين النص والأيقونة */
            display: none; /* مخفي افتراضياً */
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* ------------------------------------- */
        /* ----- ستايلات شاشة النجاح الجديدة (كما هي) ----- */
        /* ------------------------------------- */
        
        #successModal {
            display: none; 
            position: fixed;
            z-index: 1000; 
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.7); 
            justify-content: center;
            align-items: center;
            direction: rtl;
        }

        .modal-content {
            background-color: #fefefe;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            max-width: 300px;
            width: 90%;
            animation: slideIn 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .success-icon {
            color: #4CAF50; 
            font-size: 70px;
            line-height: 1;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
            animation: pulse 1s infinite alternate;
        }

        .success-message {
            color: var(--dark-blue);
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .success-subtext {
            color: #666;
            font-size: 15px;
            margin-bottom: 30px;
        }

        .close-button {
            background-color: var(--light-blue);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.3s;
        }
        
        .close-button:hover {
            background-color: var(--dark-blue);
        }

        @keyframes slideIn {
            0% { transform: translateY(-100px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-section">
            <div class="logo">
                <img src="logo-jamii.png" alt="شعار جامعيون ">
            </div>
            <p class="brand-name">جامعيون</p>
            <p class="brand-description">جامعيون <b>تطبيق</b> ومبادرة طلابية <b>لطلاب الجامعة</b></p>
        </div>
        
        <hr> <h1 class="form-title">تسجيل الحضور</h1>
        
        <form id="attendanceForm" class="simple-form">
            <p class="instruction-text">الرجاء إدخال <b>الاسم بالضبط</b> حسب منصة نحن</p>
            
            <div class="form-group">
                <input type="text" id="employeeName" name="employeeName" placeholder="اكتب اسمك هنا" required>
            </div>
            
            <button type="submit" class="submit-button" id="submitButton">
                <span id="buttonText">تسجيل الحضور الآن</span>
                <div class="spinner" id="loadingSpinner"></div>
            </button>
        </form>
    </div>

    <div id="successModal">
        <div class="modal-content">
            <div class="success-icon">✓</div>
            <div class="success-message" id="modalMessage">تم تسجيل الحضور بنجاح!</div>
            <div class="success-subtext"> لاتنسى تحميل تطبيق جامعيون ومتابعة حسابات جامعيون.</div>
            <button class="close-button" onclick="closeModal()">حسناً</button>
        </div>
    </div>

    <script>
        const form = document.getElementById('attendanceForm');
        const modal = document.getElementById('successModal');
        const submitButton = document.getElementById('submitButton');
        const buttonText = document.getElementById('buttonText'); // العنصر الجديد
        const loadingSpinner = document.getElementById('loadingSpinner'); // العنصر الجديد
        const inputField = document.getElementById('employeeName');
        const modalMessage = document.getElementById('modalMessage');

        
        function closeModal() {
            modal.style.display = 'none';
        }

        document.addEventListener('DOMContentLoaded', () => {
            form.addEventListener('submit', async function(e) {
                e.preventDefault(); 
                const name = inputField.value.trim();

                if (name === "") {
                    alert('الرجاء إدخال اسمك للتسجيل قبل الإرسال.');
                    return;
                }

                
                buttonText.textContent = 'جاري التسجيل...';
                loadingSpinner.style.display = 'block'; 
                submitButton.disabled = true;

                try {
                    const response = await fetch("https://script.google.com/macros/s/AKfycbx1sq7haZ6lK-Rh9Lic7jnLx2dwil_Re8OQaJ_YMba0MSL3m43BY_615GJdpBQMxoCPzw/exec", {
                        method: "POST",
                        body: new URLSearchParams({ employeeName: name })
                    });

                    const result = await response.text(); 
                    
                    
                    modalMessage.textContent = result;
                    modal.style.display = 'flex'; 
                    form.reset(); 

                } catch (error) {
                    
                    modalMessage.textContent = "حدث خطأ أثناء التسجيل. حاول مرة أخرى.";
                    modal.style.display = 'flex';
                    
                } finally {
                    
                    buttonText.textContent = 'تسجيل الحضور الآن';
                    loadingSpinner.style.display = 'none'; 
                    submitButton.disabled = false;
                }
            });

            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    closeModal();
                }
            });
        });
    </script>
</body>
</html>
